<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재고 현황 - 판매실적 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="../assets/css/common.css" rel="stylesheet">
    <script src="../assets/js/sheets-api.js?v=20260615h"></script>
    <style>
        /* 재고 표 — 컴팩트형: 행 촘촘 + 구분선 유지 + 숫자 우측정렬 + 0값 흐리게 + 재고열 강조 */
        .data-table th,
        .data-table td {
            padding: 0.5rem 1rem;
        }
        /* 컴팩트 상태에서 행 경계가 또렷하도록 가로 구분선 강화 */
        .data-table td {
            border-bottom: 1px solid #d1d5db;
        }
        /* 품목명은 가운데, 숫자 3열은 오른쪽 정렬(자릿수 비교 쉽게) */
        .data-table th.col-name,
        .data-table td.col-name {
            text-align: center;
        }
        .data-table th.col-num,
        .data-table td.col-num {
            text-align: right;
            padding-right: 1.5rem;
            font-variant-numeric: tabular-nums;
        }
        /* 생산·출고가 0인 칸은 흐리게 처리해 실제 값이 있는 칸만 눈에 띄게 */
        .data-table td.zero {
            color: #9ca3af;
        }
        /* 현재 재고 열 강조 띠 */
        .data-table th.col-stock,
        .data-table td.col-stock {
            border-left: 2px solid #93c5fd;
        }
    </style>
</head>

<body class="bg-gray-50">
    <nav class="bg-white shadow-sm border-b no-print">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="../index.html" class="text-lg font-semibold text-gray-900">← 대시보드로 돌아가기</a>
            <span class="text-blue-600 font-medium text-lg">실시간 재고 현황</span>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-6 mb-8 no-print">
            <div class="flex flex-wrap items-end gap-4">
                <div>
                    <label class="form-label">생산 제품</label>
                    <select id="filterProductType" class="form-select w-40">
                        <option value="보행매트">보행매트</option>
                        <option value="식생매트">식생매트</option>
                        <option value="고정핀">고정핀</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">조회 연도</label>
                    <select id="filterYear" class="form-select w-32">
                        <option value="all">전체</option>
                        <option value="2025">2025년</option>
                        <option value="2026">2026년</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">조회 월</label>
                    <select id="filterMonth" class="form-select w-32">
                        <option value="all">전체</option>
                        <script>
                            for (let i = 1; i <= 12; i++) document.write(`<option value="${i}">${i}월</option>`);
                        </script>
                    </select>
                </div>
                <button id="searchBtn" class="btn btn-primary">조회하기</button>
                <button id="weeklyStatusBtn" class="btn btn-warning">생산 현황</button>
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSfvu6_6g7h_3QdLKbPXdeaf5JWsDuOW638oYEtq5IkMXhcubQ/viewform"
                    target="_blank" rel="noopener" class="btn" style="background-color: #673AB7; color: white;">폼 입력</a>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-blue-500">
                <p class="text-sm font-medium text-gray-500" id="prodLabel">선택 기간 생산량</p>
                <p class="text-2xl font-bold text-gray-900" id="totalProd">-</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-red-500">
                <p class="text-sm font-medium text-gray-500" id="outLabel">선택 기간 출고량</p>
                <p class="text-2xl font-bold text-gray-900" id="totalOut">-</p>
            </div>
            <div class="bg-white rounded-lg shadow-md p-6 border-l-4 border-green-500">
                <p class="text-sm font-medium text-gray-500" id="stockLabel">기말 총 재고</p>
                <p class="text-2xl font-bold text-gray-900" id="totalStock">-</p>
            </div>
        </div>

        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <table class="data-table w-full">
                <thead>
                    <tr>
                        <th class="col-name px-4 py-3 cursor-pointer hover:bg-gray-100" onclick="sortTable('name')">
                            품목명 (규격) <span id="sort-name" class="sort-icon"></span>
                        </th>
                        <th class="col-num px-4 py-3 cursor-pointer hover:bg-gray-100" onclick="sortTable('prod')">
                            <span id="th-prod-label">당월 생산</span> <span id="sort-prod" class="sort-icon"></span>
                        </th>
                        <th class="col-num px-4 py-3 cursor-pointer hover:bg-gray-100" onclick="sortTable('out')">
                            당월 출고 <span id="sort-out" class="sort-icon"></span>
                        </th>
                        <th class="col-num col-stock px-4 py-3 bg-blue-50 cursor-pointer hover:bg-blue-100"
                            onclick="sortTable('stock')">
                            현재 재고 <span id="sort-stock" class="sort-icon"></span>
                        </th>
                    </tr>
                </thead>
                <tbody id="inventoryList">
                    <tr>
                        <td colspan="4" class="text-center py-8 text-gray-500">데이터를 불러오는 중...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="../assets/js/common.js"></script>
    <script src="../assets/js/inventory-management.js?v=20260702c"></script>
</body>

</html>
